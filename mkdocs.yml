site_name: MOTCO
site_description: Multi-omics Trajectory Comparison — latent spaces (PLS, SNF) and group differences
repo_url: https://github.com/tomszar/MOTCO
repo_name: tomszar/MOTCO

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: teal

nav:
  - Home: index.md
  - API Reference:
    - PLS-DA: api/pls.md
    - SNF: api/snf.md
    - Trajectory Analysis (SD): api/sd.md
    - CLI: api/cli.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
